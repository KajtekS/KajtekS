name: Generate Pacman Contribution Graph

on:
  # Odpalaj automatycznie co 24 godziny
  schedule:
    - cron: "0 0 * * *"
  
  # Pozwól na ręczne odpalenie w zakładce Actions
  workflow_dispatch:
  
  # Odpalaj przy każdym pushu na gałąź main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generuje wykresy w formacie SVG
      - name: generate-github-contribution-grid-snake
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark
          
      # Wypycha wygenerowane pliki SVG na osobną gałąź pacman-output
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
